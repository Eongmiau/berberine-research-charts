<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<meta name="color-scheme" content="light">
<meta name="supported-color-schemes" content="light">
<title>베르베린과 대사균형의 연관성 연구결과 · better.weller</title>
<meta name="description" content="베르베린과 대사균형(BMI·허리둘레·지방대사·공복혈당)의 연관성 연구결과">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --orange:#ff7546; --orange-deep:#fc4c02; --ink:#292b31; --olive:#a0b784;
    --gray:#6e7479; --bargray:#e7e7e7; --grid:#e7eff8; --dot:#5f6fa8;
    --font:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color-scheme:light;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{background:#fff;font-family:var(--font);color:#000;}
  #wrap{width:1080px;margin:0 auto;background:#fff;padding:160px 70px 170px;}

  .rbadge{display:inline-block;background:var(--olive);color:#fff;border-radius:12px;
          padding:4px 13px;font-weight:400;font-size:37px;line-height:1.6;}
  h1{margin-top:63px;font-weight:600;font-size:91px;letter-spacing:-2.73px;line-height:0.976;color:#000;}
  h1 .hl{color:var(--orange);}
  h1 .l2{display:block;margin-top:30px;font-weight:400;font-size:83px;letter-spacing:-2.49px;}

  /* two single bar charts, side by side */
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:84px;margin-top:280px;}
  /* full-width line charts */
  .solo{margin-top:300px;}

  .chart{position:relative;display:flex;align-items:flex-start;gap:16px;}
  .ylabels{position:relative;width:30px;flex:none;height:377.41px;margin-top:67px;}
  .ylabels span{position:absolute;right:0;transform:translateY(-50%);width:30px;text-align:right;
                font-weight:300;font-size:19.79px;line-height:1;color:var(--gray);letter-spacing:-0.594px;}
  .ylabels .wave{font-size:23px;color:#aeb4bc;font-weight:400;letter-spacing:0;}
  .ylabels .ynote{right:auto;left:-32px;top:50%;transform:translateY(-50%) rotate(-90deg);width:auto;font-size:18px;color:#9aa0a4;font-weight:400;letter-spacing:0;white-space:nowrap;}
  .cbody{flex:1;display:flex;flex-direction:column;gap:26px;min-width:0;}
  .card{box-shadow:0 12px 9.85px rgba(130,133,156,.25);}
  .chdr{background:#000;padding:14px 22px;display:flex;align-items:center;justify-content:center;gap:26px;}
  .chdr .t{font-weight:600;font-size:28px;letter-spacing:-0.84px;line-height:1.6;color:var(--orange);}
  .legend{display:flex;gap:22px;}
  .legend .lg{display:flex;align-items:center;gap:9px;font-weight:400;font-size:22px;color:rgba(255,255,255,.82);}
  .legend .lg i{width:15px;height:15px;border-radius:50%;}
  .plot{position:relative;height:377.41px;overflow:hidden;border-bottom:10.19px solid #000;
        background-color:#fff;
        background-image:repeating-linear-gradient(var(--grid) 0 1px,transparent 1px 18.87px),
                         repeating-linear-gradient(90deg,var(--grid) 0 1px,transparent 1px 18.87px);}
  .bars{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:52%;
        display:flex;align-items:flex-end;justify-content:space-between;}
  .bar{width:37%;border-radius:2px 2px 0 0;}
  .bar.before{background:var(--bargray);}
  .bar.after{background:var(--ink);}
  .xlabels{position:relative;height:40px;}
  .xlabels span{position:absolute;transform:translateX(-50%);font-weight:500;font-size:24px;line-height:1.6;color:var(--gray);letter-spacing:-0.72px;white-space:nowrap;}
  .xnote{text-align:center;font-weight:400;font-size:20px;color:#9aa0a4;margin-top:2px;}

  .circle{position:absolute;width:130px;height:132px;border-radius:50%;
          background:var(--orange-deep);display:flex;flex-direction:column;align-items:center;
          justify-content:center;color:#fff;line-height:1.19;letter-spacing:-1.03px;z-index:3;}
  .circle .pct{font-weight:600;font-size:44px;}
  .circle .lab{font-weight:600;font-size:29px;}
  .cap{text-align:center;font-weight:500;font-size:40px;letter-spacing:-1.3px;color:#000;margin-top:20px;word-break:keep-all;}
  .cap b{color:var(--orange);font-weight:700;}

  .foot{margin-top:90px;color:rgba(135,141,146,.75);font-size:20px;line-height:1.55;font-weight:400;}
  .foot p{margin-bottom:4px;}

  /* ---------- entrance motion (scroll-triggered via .in) ---------- */
  .bar{transform:scaleY(0);transform-origin:bottom;transition:transform .95s cubic-bezier(.22,1,.36,1);}
  .chart.in .bar.before{transform:scaleY(1);transition-delay:.10s;}
  .chart.in .bar.after{transform:scaleY(1);transition-delay:.24s;}
  .dotline{opacity:0;transition:opacity .55s ease;transition-delay:1.1s;}
  .chart.in .dotline{opacity:1;}
  .circle{transform:scale(0);transition:transform .6s cubic-bezier(.34,1.56,.64,1);transition-delay:1.25s;}
  .chart.in .circle{transform:scale(1);}
  .dataline{stroke-dasharray:var(--len);stroke-dashoffset:var(--len);transition:stroke-dashoffset 1.3s cubic-bezier(.33,.1,.25,1);}
  .chart.in .dataline{stroke-dashoffset:0;}
  .datadot{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(0);
           transition:opacity .35s ease,transform .45s cubic-bezier(.34,1.56,.64,1);}
  .chart.in .datadot{opacity:1;transform:scale(1);}
  .brkband{opacity:0;transition:opacity .5s ease;transition-delay:.3s;}
  .chart.in .brkband{opacity:1;}
  .cap{opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s ease;transition-delay:1.5s;}
  .chart.in .cap{opacity:1;transform:none;}
  .still *{transition:none!important;animation:none!important;}
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="wrap">

  <span class="rbadge">Research</span>
  <h1>베르베린과 <span class="hl">대사균형</span>의<span class="l2">연관성 연구결과</span></h1>

  <div class="duo" id="duo"></div>
  <div class="solo" id="lipid"></div>
  <div class="solo" id="glucose"></div>

  <div class="foot">
    <p>※ 본 내용은 ‘베르베린’에 대한 일반 연구정보로, 특정 제품의 효능이나 효과를 의미하지 않습니다. (무작위 배정·이중맹검·위약 대조, 섭취 12주)</p>
    <p>※ BMI·허리둘레·공복혈당 N=116, Zhang Y, et al. 2008, J Clin Endocrinol Metab. &nbsp;·&nbsp; 지방대사 N=37, Yang J, et al. 2012, Evid Based Complement Alternat Med.</p>
  </div>

</div>

<script>
const NS='http://www.w3.org/2000/svg';
const PH=377.41, B0=0.336, B1=0.664;
const svgel=(n,a)=>{const e=document.createElementNS(NS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};

/* ---------- single before/after BAR chart ---------- */
const BARS=[
  {title:'BMI 감소',     pct:'13%',  ticks:[32,30,28,26], vBot:25, vTop:33, before:31.5, after:27.3},
  {title:'허리둘레 감소', pct:'5.3%', ticks:[100,95,90,85], vBot:83, vTop:100, before:97.5, after:92},
];
const yP=(c,v)=>PH-(v-c.vBot)/(c.vTop-c.vBot)*PH;
function barChart(c){
  const bH=v=>PH-yP(c,v);
  const el=document.createElement('div');el.className='chart';
  el.innerHTML=`
    <div class="ylabels">${c.ticks.map(t=>`<span style="top:${yP(c,t).toFixed(1)}px">${t}</span>`).join('')}</div>
    <div class="cbody">
      <div class="card">
        <div class="chdr"><span class="t">${c.title}</span></div>
        <div class="plot">
          <div class="bars"><div class="bar before" style="height:${bH(c.before).toFixed(1)}px"></div><div class="bar after" style="height:${bH(c.after).toFixed(1)}px"></div></div>
        </div>
      </div>
      <div class="xlabels two"><span>섭취 전</span><span>섭취 후</span></div>
    </div>`;
  return el;
}

/* ---------- multi-series LINE chart (same tone) ---------- */
const yPL=(c,v)=>{
  if(c.brk){const s=v>=c.up.vMin?c.up:c.lo;return s.y0-(v-s.vMin)/(s.vMax-s.vMin)*(s.y0-s.y1);}
  return PH-(v-c.vBot)/(c.vTop-c.vBot)*PH;
};
function lineChart(c){
  const el=document.createElement('div');el.className='chart';
  const legend=c.series.map(s=>`<span class="lg"><i style="background:${s.color}"></i>${s.name}</span>`).join('');
  const ticks=c.brk?[...c.up.ticks,...c.lo.ticks]:c.ticks;
  const ylab=ticks.map(t=>`<span style="top:${yPL(c,t).toFixed(1)}px">${t}</span>`).join('')
    +(c.brk?`<span class="wave" style="top:${c.brk.breakY}px">≈</span>`:'')
    +(c.ynote?`<span class="ynote">${c.ynote}</span>`:'');
  el.innerHTML=`
    <div class="ylabels">${ylab}</div>
    <div class="cbody">
      <div class="card">
        <div class="chdr"><span class="t">${c.title}</span><div class="legend">${legend}</div></div>
        <div class="plot"></div>
      </div>
      <div class="xlabels ${c.xtwo?'two':''}">${c.xlabels.map(x=>`<span>${x}</span>`).join('')}</div>
      ${c.xnote?`<div class="xnote">${c.xnote}</div>`:''}
      <div class="cap">${c.cap}</div>
    </div>`;
  return el;
}
function drawLines(chartEl,c){
  const plot=chartEl.querySelector('.plot'), W=plot.clientWidth;
  const n=c.xlabels.length, m=c.xtwo?0.16:0.07, DUR=1.3;
  const xAt=i=>W*(m+(1-2*m)*i/(n-1));
  const svg=svgel('svg',{width:W,height:PH});svg.style.cssText='position:absolute;inset:0;z-index:2;';
  c.series.forEach((s,si)=>{
    const base=si*0.14;
    const pts=s.pts.map((v,i)=>`${xAt(i).toFixed(1)},${yPL(c,v).toFixed(1)}`).join(' ');
    const pl=svgel('polyline',{points:pts,fill:'none',stroke:s.color,'stroke-width':5,'stroke-linecap':'round','stroke-linejoin':'round',class:'dataline'});
    // total polyline length (sum of segments) drives the draw-in dash animation
    let len=0;for(let i=1;i<s.pts.length;i++){len+=Math.hypot(xAt(i)-xAt(i-1),yPL(c,s.pts[i])-yPL(c,s.pts[i-1]));}
    pl.style.setProperty('--len',len.toFixed(1));pl.style.transitionDelay=base+'s';
    svg.appendChild(pl);
    s.pts.forEach((v,i)=>{
      const dot=svgel('circle',{cx:xAt(i),cy:yPL(c,v),r:8,fill:s.color,stroke:'#fff','stroke-width':3,class:'datadot'});
      const frac=n===1?1:i/(n-1);
      dot.style.transitionDelay=(base+0.15+frac*DUR).toFixed(2)+'s';
      svg.appendChild(dot);
    });
  });
  plot.appendChild(svg);
  // broken-axis wave band across the plot (mask the omitted middle)
  if(c.brk){
    const by=c.brk.breakY,bd=c.brk.band;
    const bsvg=svgel('svg',{width:W,height:PH});bsvg.style.cssText='position:absolute;inset:0;z-index:3;pointer-events:none;';bsvg.classList.add('brkband');
    bsvg.appendChild(svgel('rect',{x:-2,y:by-bd,width:W+4,height:bd*2,fill:'#fff'}));
    const wpath=yy=>{let d=`M 0 ${yy}`,up=true;for(let x=0;x<W;x+=13){d+=` q 6.5 ${up?-4:4} 13 0`;up=!up;}return d;};
    bsvg.appendChild(svgel('path',{d:wpath(by-bd),fill:'none',stroke:'#cdd3da','stroke-width':2}));
    bsvg.appendChild(svgel('path',{d:wpath(by+bd),fill:'none',stroke:'#cdd3da','stroke-width':2}));
    plot.appendChild(bsvg);
  }
  // align x-labels under each data point
  const labs=chartEl.querySelectorAll('.xlabels span');
  labs.forEach((s,i)=>{s.style.left=xAt(i)+'px';});
}

/* build */
const duo=document.getElementById('duo');
BARS.forEach(c=>duo.appendChild(barChart(c)));

const lipid={title:'지방대사 지표',xlabels:['섭취 전','섭취 후'],xtwo:true,
  brk:{breakY:186,band:4},
  up:{vMin:5.1,vMax:7,y0:172,y1:22,ticks:[7,6]},
  lo:{vMin:1.4,vMax:4.2,y0:360,y1:200,ticks:[4,3,2]},
  series:[{name:'콜레스테롤',color:'#a8adb4',pts:[6.5,5.58]},{name:'LDL',color:'#5f6fa8',pts:[3.6,2.8]},{name:'중성지방',color:'#ff7546',pts:[3.3,2.03]}],
  cap:'중성지방 <b>38.6%</b> · LDL <b>22.3%</b> · 콜레스테롤 <b>14.2%</b> 감소'};
const glucose={title:'공복 혈당',ticks:[8,7,6,5,4],vBot:3.8,vTop:8.3,xlabels:['0','1','2','3'],xnote:'(섭취 개월)',ynote:'(mmol/L)',
  series:[{name:'플라시보',color:'#a8adb4',pts:[6.8,6.7,6.6,6.5]},{name:'베르베린',color:'#ff7546',pts:[7.1,6.0,5.8,5.5]}],
  cap:'공복혈당 <b>20%</b> 감소'};

const lipidEl=lineChart(lipid), glucoseEl=lineChart(glucose);
document.getElementById('lipid').appendChild(lipidEl);
document.getElementById('glucose').appendChild(glucoseEl);

requestAnimationFrame(()=>{
  // bar chart dotline + dots + circle
  duo.querySelectorAll('.chart').forEach((ch,i)=>{
    const c=BARS[i],plot=ch.querySelector('.plot'),W=plot.clientWidth;
    const pr=plot.getBoundingClientRect(),cr=ch.getBoundingClientRect();
    const ox=pr.left-cr.left,oy=pr.top-cr.top;
    // measure each bar's real X-center (scaleY grow doesn't affect X); compute Y from data → dots/line sit exactly on the bars
    const bb=ch.querySelector('.bar.before').getBoundingClientRect();
    const ab=ch.querySelector('.bar.after').getBoundingClientRect();
    const bdr=PH-plot.clientHeight; // plot is border-box w/ a 10.19px bottom border → bars live in the shorter content box; lift dots by the border so they land exactly on each bar's top
    const x0=bb.left+bb.width/2-pr.left, y0=yP(c,c.before)-bdr;
    const x1=ab.left+ab.width/2-pr.left, y1=yP(c,c.after)-bdr;
    const svg=svgel('svg',{width:W,height:PH});svg.style.cssText='position:absolute;inset:0;z-index:2;';svg.classList.add('dotline');
    // round dotted line: small circles spaced along, bigger dots at ends
    const dx=x1-x0,dy=y1-y0,len=Math.hypot(dx,dy),step=10,N=Math.round(len/step);
    for(let k=1;k<N;k++){const t=k/N;svg.appendChild(svgel('circle',{cx:(x0+dx*t).toFixed(1),cy:(y0+dy*t).toFixed(1),r:2.4,fill:'#5f6fa8'}));}
    [[x0,y0],[x1,y1]].forEach(([cx,cy])=>svg.appendChild(svgel('circle',{cx,cy,r:6,fill:'#5f6fa8'})));
    plot.appendChild(svg);
    // orange badge sits in the TOP-RIGHT CORNER, fully INSIDE the plot (right edge 10px from plot edge → never clips when the page is cropped); smaller size keeps it clear of the after-bar/dotted-line below
    const b=document.createElement('div');b.className='circle';b.innerHTML=`<span class="pct">${c.pct}</span><span class="lab">감소</span>`;
    b.style.left=(ox+W-140)+'px';b.style.top=(oy+12)+'px';ch.appendChild(b);
    // align x-labels under each bar center
    const labs=ch.querySelectorAll('.xlabels span');
    if(labs[0])labs[0].style.left=x0+'px'; if(labs[1])labs[1].style.left=x1+'px';
  });
  drawLines(lipidEl,lipid);
  drawLines(glucoseEl,glucose);
  reveal();
});

/* ---------- entrance motion controller ---------- */
const RM=matchMedia('(prefers-reduced-motion: reduce)').matches;
const STILL=location.search.indexOf('still')>=0||RM;
function countUp(el){
  const raw=(el.dataset.val||el.textContent).trim();el.dataset.val=raw;
  const num=parseFloat(raw);if(isNaN(num))return;
  const decs=((raw.split('.')[1]||'').match(/\d+/)||[''])[0].length;
  const suf=raw.replace(/[\d.]+/,''), t0=performance.now(), dur=900;
  const tick=t=>{const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3);
    el.textContent=(num*e).toFixed(decs)+suf;
    if(p<1)requestAnimationFrame(tick);else el.textContent=num.toFixed(decs)+suf;};
  requestAnimationFrame(tick);
}
function playChart(ch){
  ch.classList.add('in');
  const pct=ch.querySelector('.circle .pct');
  if(pct)setTimeout(()=>countUp(pct),1250);
}
function reveal(){
  const charts=[...document.querySelectorAll('.chart')];
  if(STILL){document.body.classList.add('still');charts.forEach(c=>c.classList.add('in'));return;}
  const io=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){playChart(e.target);io.unobserve(e.target);}});},
    {threshold:0.28,rootMargin:'0px 0px -8% 0px'});
  charts.forEach(c=>io.observe(c));
}
</script>
</body>
</html>
